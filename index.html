<!doctype html>
<html lang="en" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Student Services Platform</title>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (document.body) {
        document.body.innerHTML += '<div style="color:white; background:red; padding:20px; text-align:left; direction:ltr; z-index:999999; position:fixed; top:0; left:0; width:100%;"><b>Critical Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      }
    });
    window.addEventListener('unhandledrejection', function (e) {
      if (document.body) {
        document.body.innerHTML += '<div style="color:white; background:red; padding:20px; text-align:left; direction:ltr; z-index:999999; position:fixed; top:0; left:0; width:100%;"><b>Unhandled Promise Rejection:</b> ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
      }
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
